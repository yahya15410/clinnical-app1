<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research with Yahya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .study-card { transition: all 0.3s; }
    .study-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .condition-chip {
      transition: all 0.2s;
    }
    .condition-chip:hover {
      transform: translateY(-2px);
      background-color: #2563eb;
      color: white;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-6">
    <!-- Header -->
    <header class="flex justify-between items-center mb-10 border-b pb-6">
      <div>
        <h1 class="text-5xl font-bold flex items-center gap-4">
          <i class="fa-solid fa-flask text-blue-600"></i> 
          Research with Yahya
        </h1>
        <p class="text-gray-600 text-lg mt-2">Clinical Trials Explorer + Yahya AI</p>
      </div>
      
      <div class="flex items-center gap-4">
        <input id="apiKey" type="password" placeholder="OpenAI or xAI API Key" 
               class="px-4 py-2 border rounded-xl w-80 focus:outline-none focus:border-blue-500">
        <button onclick="saveApiKey()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700">
          Save Key
        </button>
      </div>
    </header>

    <!-- Popular Conditions -->
    <div class="bg-white p-6 rounded-3xl shadow mb-8">
      <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
        <i class="fa-solid fa-heart-pulse text-red-500"></i> Popular Conditions
      </h3>
      <div class="flex flex-wrap gap-3" id="popularConditions"></div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white p-6 rounded-3xl shadow mb-8">
      <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
        <input id="searchInput" type="text" placeholder="Search condition (e.g. diabetes)" 
               class="px-5 py-4 border border-gray-300 rounded-2xl">
        <select id="studyType" class="px-5 py-4 border border-gray-300 rounded-2xl">
          <option value="">All Types</option>
          <option value="INTERVENTIONAL">Interventional</option>
          <option value="OBSERVATIONAL">Observational</option>
        </select>
        <select id="status" class="px-5 py-4 border border-gray-300 rounded-2xl">
          <option value="">All Status</option>
          <option value="RECRUITING">Recruiting</option>
          <option value="COMPLETED">Completed</option>
        </select>
        <button onclick="searchTrials()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl flex items-center justify-center gap-2 col-span-2">
          <i class="fa-solid fa-magnifying-glass"></i> Search Trials
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Results -->
      <div class="lg:col-span-8">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-semibold" id="resultsTitle">Search Results</h2>
          <button onclick="showAddStudyModal()" class="bg-green-600 text-white px-5 py-2 rounded-2xl flex items-center gap-2 hover:bg-green-700">
            <i class="fa-solid fa-plus"></i> Add New Study
          </button>
        </div>
        <div id="results" class="space-y-6"></div>
      </div>

      <!-- Yahya AI Sidebar -->
      <div class="lg:col-span-4">
        <div class="bg-white rounded-3xl shadow p-6 sticky top-6">
          <h3 class="font-semibold mb-4 flex items-center gap-2">
            <i class="fa-solid fa-brain text-purple-600"></i> Yahya AI Analysis
          </h3>
          <div id="aiPanel" class="min-h-[400px] bg-gray-50 rounded-2xl p-5 text-sm overflow-auto"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add New Study Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-lg mx-4 rounded-3xl p-8">
      <h2 class="text-2xl font-bold mb-6">Add New Study</h2>
      <input id="newTitle" placeholder="Study Title" class="w-full px-4 py-3 border rounded-2xl mb-4">
      <input id="newNct" placeholder="NCT ID (optional)" class="w-full px-4 py-3 border rounded-2xl mb-4">
      <select id="newType" class="w-full px-4 py-3 border rounded-2xl mb-4">
        <option value="INTERVENTIONAL">Interventional</option>
        <option value="OBSERVATIONAL">Observational</option>
      </select>
      <textarea id="newSummary" rows="5" placeholder="Brief Summary / Description" class="w-full px-4 py-3 border rounded-2xl mb-4"></textarea>
      <div class="flex gap-3">
        <button onclick="addNewStudy()" class="flex-1 bg-green-600 text-white py-3 rounded-2xl">Add Study</button>
        <button onclick="closeAddModal()" class="flex-1 bg-gray-300 py-3 rounded-2xl">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Study Detail Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white max-w-2xl w-full mx-4 rounded-3xl max-h-[90vh] overflow-auto">
      <div class="p-8" id="modalContent"></div>
      <div class="border-t p-4 flex gap-3 justify-end">
        <button onclick="analyzeWithAI()" class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Analyze with Yahya AI
        </button>
        <button onclick="closeModal()" class="px-6 py-3 bg-gray-800 text-white rounded-2xl">Close</button>
      </div>
    </div>
  </div>

  <script>
    let allStudies = [];
    let userStudies = JSON.parse(localStorage.getItem('userStudies')) || [];
    let currentStudy = null;
    let apiKey = localStorage.getItem('aiApiKey') || '';

    if (apiKey) document.getElementById('apiKey').value = apiKey;

    const commonDiseases = ["Cancer", "Diabetes", "Hypertension", "Asthma", "Alzheimer", "COVID-19", "Heart Disease", "Arthritis", "Obesity", "Breast Cancer"];

    function createPopularButtons() {
      const container = document.getElementById('popularConditions');
      container.innerHTML = commonDiseases.map(d => `
        <button onclick="quickSearch('${d}')" class="condition-chip px-6 py-3 bg-gray-100 text-gray-700 rounded-3xl text-sm font-medium border">
          ${d}
        </button>
      `).join('');
    }

    function quickSearch(disease) {
      document.getElementById('searchInput').value = disease;
      searchTrials();
    }

    function saveApiKey() {
      apiKey = document.getElementById('apiKey').value.trim();
      if (apiKey) {
        localStorage.setItem('aiApiKey', apiKey);
        alert("✅ API Key saved successfully!");
      }
    }

    async function searchTrials() {
      const query = document.getElementById('searchInput').value.trim() || "cancer";
      const url = `https://clinicaltrials.gov/api/v2/studies?format=json&pageSize=15&query.cond=${encodeURIComponent(query)}`;

      document.getElementById('results').innerHTML = `<p class="text-center py-12 text-gray-500">Fetching data from ClinicalTrials.gov...</p>`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        allStudies = [...(data.studies || []), ...userStudies];
        renderResults(allStudies);
      } catch (e) {
        document.getElementById('results').innerHTML = `<p class="text-red-600 text-center py-12">Error connecting to ClinicalTrials.gov</p>`;
      }
    }

    function renderResults(studies) {
      const container = document.getElementById('results');
      document.getElementById('resultsTitle').textContent = `Search Results (${studies.length})`;

      container.innerHTML = studies.map((study, i) => {
        const p = study.protocolSection || study;
        const id = p.identificationModule?.nctId || p.nctId || `USER-${i}`;
        const title = p.identificationModule?.briefTitle || p.title || "Untitled Study";
        const isUser = study.isUserStudy;

        return `
          <div onclick="showStudyDetail(${i})" class="study-card bg-white border border-gray-200 rounded-3xl p-6 cursor-pointer hover:border-blue-400">
            <div class="flex justify-between">
              <div>
                <div class="font-semibold text-lg">${title}</div>
                <div class="text-blue-600 font-mono text-sm">${id}</div>
              </div>
              ${isUser ? `<span class="text-xs px-3 py-1 bg-green-100 text-green-700 rounded-full">Your Study</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function showStudyDetail(index) {
      currentStudy = allStudies[index];
      const p = currentStudy.protocolSection || currentStudy;
      const title = p.identificationModule?.briefTitle || p.title || "Study";
      const summary = p.descriptionModule?.briefSummary || p.summary || "No summary available.";

      document.getElementById('modalContent').innerHTML = `
        <h2 class="text-2xl font-bold mb-4">${title}</h2>
        <p class="text-gray-500 mb-6">${p.identificationModule?.nctId || p.nctId || ''}</p>
        <p class="text-gray-700 leading-relaxed">${summary}</p>
      `;
      document.getElementById('modal').classList.remove('hidden');
    }

    async function analyzeWithAI() {
      if (!apiKey) return alert("Please enter and save your API Key first!");
      const panel = document.getElementById('aiPanel');
      panel.innerHTML = `<p class="text-center py-10">🤖 Yahya AI is analyzing the study...</p>`;

      const prompt = `Analyze this clinical trial professionally as a medical researcher:\nTitle: ${currentStudy.protocolSection?.identificationModule?.briefTitle || currentStudy.title}\nSummary: ${currentStudy.protocolSection?.descriptionModule?.briefSummary || currentStudy.summary || ''}`;

      try {
        const response = await fetch('https://api.x.ai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "grok-4",
            messages: [{ role: "user", content: prompt }],
            max_tokens: 800
          })
        });
        const data = await response.json();
        const result = data.choices?.[0]?.message?.content || "No response";
        panel.innerHTML = `<div class="prose text-sm">${result.replace(/\n/g, '<br><br>')}</div>`;
      } catch (err) {
        panel.innerHTML = `<p class="text-red-600">AI connection failed. Check API key.</p>`;
      }
    }

    function showAddStudyModal() {
      document.getElementById('addModal').classList.remove('hidden');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    function addNewStudy() {
      const title = document.getElementById('newTitle').value.trim();
      if (!title) return alert("Study title is required!");

      const newStudy = {
        isUserStudy: true,
        title: title,
        nctId: document.getElementById('newNct').value || "USER-" + Date.now(),
        summary: document.getElementById('newSummary').value
      };

      userStudies.push(newStudy);
      localStorage.setItem('userStudies', JSON.stringify(userStudies));
      closeAddModal();
      searchTrials();
      alert("✅ New study added successfully!");
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // Initialize App
    window.onload = () => {
      createPopularButtons();
      searchTrials();
    };
  </script>
</body>
</html>
